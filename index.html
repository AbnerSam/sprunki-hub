<!DOCTYPE html>
<html lang="pt-BR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Sprunki Hub</title>
    <style>
      :root {
        --primary: #0078d7;
        --primary-dark: #005bb5;
        --bg: #f4f4f9;
        --text: #333;
        --card-bg: #fff;
        --shadow: 0 4px 6px rgba(0, 0, 0, 0.1);
      }

      body {
        font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
        background-color: var(--bg);
        color: var(--text);
        margin: 0;
        padding: 20px;
        display: flex;
        flex-direction: column;
        align-items: center;
        min-height: 100vh;
      }

      .main-content {
        width: 100%;
        max-width: 1200px;
      }

      /* Responsividade básica para o container */
      @media (max-width: 600px) {
        body {
          padding: 10px;
        }
        h1 {
          font-size: 1.8rem;
          margin-bottom: 20px;
        }
      }

      h1 {
        color: var(--primary);
        margin-bottom: 30px;
      }

      .catalog-status {
        width: 100%;
        max-width: 1200px;
        margin-bottom: 20px;
        padding: 14px 16px;
        border-radius: 10px;
        background: rgba(255, 255, 255, 0.9);
        box-shadow: var(--shadow);
        color: var(--text);
      }

      .catalog-status[hidden] {
        display: none;
      }

      .catalog-status.is-error {
        background: #fff0f0;
        color: #8a1f1f;
        border: 1px solid #f3b9b9;
      }

      .game-grid {
        display: grid;
        gap: 20px;
        width: 100%;
        grid-template-columns: repeat(auto-fit, minmax(240px, 1fr));
        align-items: stretch;
      }

      /* Ajuste para telas bem pequenas */
      @media (max-width: 320px) {
        .game-grid {
          grid-template-columns: 1fr;
        }
      }

      .game-card {
        background: var(--card-bg);
        border-radius: 12px;
        overflow: hidden;
        box-shadow: var(--shadow);
        transition: transform 0.2s, box-shadow 0.2s;
        display: flex;
        flex-direction: column;
        min-width: 0;
      }

      .game-card:hover {
        transform: translateY(-5px);
        box-shadow: 0 8px 15px rgba(0, 0, 0, 0.15);
      }

      .game-thumb {
        width: 100%;
        aspect-ratio: 16 / 9;
        object-fit: cover;
        background-color: #ddd;
        border-bottom: 1px solid #eee;
      }

      .game-info {
        padding: 15px;
        text-align: center;
        flex-grow: 1;
        display: flex;
        flex-direction: column;
        justify-content: space-between;
      }

      .game-title {
        font-size: 1.1rem;
        font-weight: bold;
        margin-bottom: 15px;
        color: #222;
      }

      .btn {
        display: inline-block;
        padding: 12px 20px; /* Aumentado para touch */
        font-size: 1rem;
        color: #fff;
        background-color: var(--primary);
        border: none;
        border-radius: 8px;
        cursor: pointer;
        text-decoration: none;
        transition: background-color 0.2s;
        -webkit-tap-highlight-color: transparent;
      }

      .btn:hover {
        background-color: var(--primary-dark);
      }

      #game-view {
        display: none;
        position: fixed;
        inset: 0;
        background: #000;
        z-index: 1000;
      }

      #game-view iframe {
        width: 100%;
        height: 100%;
        border: none;
      }

      #back-btn {
        position: absolute;
        top: 15px;
        left: 15px;
        z-index: 1001;
        background: rgba(0, 0, 0, 0.7);
        color: white;
        padding: 10px 16px;
        border-radius: 50px; /* Mais arredondado no mobile */
        border: 1px solid rgba(255, 255, 255, 0.4);
        font-weight: bold;
        backdrop-filter: blur(4px);
      }

      @media (max-width: 600px) {
        #back-btn {
          top: 10px;
          left: 10px;
          padding: 8px 14px;
          font-size: 0.9rem;
        }
      }

      body.is-playing {
        overflow: hidden;
      }

      body.is-playing #game-view {
        display: block;
      }

      body.is-playing .main-content {
        display: none;
      }
    </style>
  </head>
  <body>
    <div class="main-content">
      <h1>Sprunki Hub</h1>
      <div id="catalogStatus" class="catalog-status">Carregando catalogo...</div>
      <div class="game-grid" id="gameGrid">
        <!-- Cards serão inseridos aqui -->
      </div>
    </div>

    <div id="game-view">
      <button id="back-btn" class="btn">← Voltar</button>
      <iframe
        id="gameFrame"
        title="Jogo"
        allowtransparency="true"
        frameborder="0"
        scrolling="no"
        allowfullscreen
      ></iframe>
    </div>

    <script>
      const gameGrid = document.getElementById('gameGrid');
      const catalogStatus = document.getElementById('catalogStatus');
      const gameFrame = document.getElementById('gameFrame');
      const backBtn = document.getElementById('back-btn');
      let gamesList = [];

      function escapeHtml(value) {
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;')
          .replace(/"/g, '&quot;')
          .replace(/'/g, '&#39;');
      }

      function setStatus(message, isError = false) {
        catalogStatus.textContent = message;
        catalogStatus.hidden = false;
        catalogStatus.classList.toggle('is-error', isError);
      }

      function clearStatus() {
        catalogStatus.hidden = true;
        catalogStatus.classList.remove('is-error');
      }

      function normalizeCatalogItem(item) {
        if (!item || typeof item !== 'object') {
          return null;
        }

        const hasCoreFields = item.id && item.title && item.thumb;
        const sourceType = item.source && item.source.type;

        if (!hasCoreFields || !sourceType) {
          return null;
        }

        return {
          id: String(item.id),
          slug: item.slug ? String(item.slug) : String(item.id),
          title: String(item.title),
          thumb: String(item.thumb),
          source: item.source,
          tags: Array.isArray(item.tags) ? item.tags : []
        };
      }

      function getFallbackThumb() {
        return 'https://via.placeholder.com/480x360?text=Sem+Imagem';
      }

      function renderGames() {
        if (!gamesList.length) {
          setStatus('Nenhum jogo disponivel no catalogo.', true);
          gameGrid.innerHTML = '';
          return;
        }

        clearStatus();
        gameGrid.innerHTML = gamesList.map(game => `
          <div class="game-card">
            <img src="${escapeHtml(game.thumb)}" alt="${escapeHtml(game.title)}" class="game-thumb" onerror="this.src='${getFallbackThumb()}'">
            <div class="game-info">
              <div class="game-title">${escapeHtml(game.title)}</div>
              <button class="btn" onclick="playGame('${escapeHtml(game.id)}')">Jogar</button>
            </div>
          </div>
        `).join('');
      }

      function resolveGameUrl(game) {
        if (!game || !game.source || !game.source.type) {
          return null;
        }

        switch (game.source.type) {
          case 'turbowarp-project':
            if (!game.source.projectId) {
              return null;
            }

            return `https://turbowarp.org/${game.source.projectId}/embed`;
          case 'sb3-file':
            if (game.source.path) {
              const sb3Path = encodeURIComponent(game.source.path);
              return `https://turbowarp.org/player?project_url=${sb3Path}`;
            }

            if (game.source.url) {
              const sb3Url = encodeURIComponent(game.source.url);
              return `https://turbowarp.org/player?project_url=${sb3Url}`;
            }

            return null;
          case 'external-url':
            return game.source.url || null;
          default:
            return null;
        }
      }

      function hideStatusWhilePlaying() {
        if (!catalogStatus.classList.contains('is-error')) {
          clearStatus();
        }
      }

      function playGame(gameId) {
        const game = gamesList.find(item => item.id === gameId);

        if (!game) {
          setStatus('Nao foi possivel localizar este jogo no catalogo.', true);
          return;
        }

        const gameUrl = resolveGameUrl(game);

        if (!gameUrl) {
          setStatus('Esta fonte ainda nao possui URL de execucao valida.', true);
          return;
        }

        hideStatusWhilePlaying();
        gameFrame.src = gameUrl;
        document.body.classList.add('is-playing');
      }

      function stopGame() {
        gameFrame.src = '';
        document.body.classList.remove('is-playing');
      }

      backBtn.addEventListener('click', stopGame);

      async function loadCatalog() {
        setStatus('Carregando catalogo...');

        try {
          const response = await fetch('./catalog.json', { cache: 'no-store' });

          if (!response.ok) {
            throw new Error(`HTTP ${response.status}`);
          }

          const catalog = await response.json();
          const items = Array.isArray(catalog.items) ? catalog.items : [];

          gamesList = items.map(normalizeCatalogItem).filter(Boolean);
          renderGames();
        } catch (error) {
          gameGrid.innerHTML = '';
          setStatus('Falha ao carregar `catalog.json`. O fluxo oficial do projeto considera hospedagem estatica, com GitHub Pages como ambiente padrao.', true);
          console.error('Erro ao carregar catalogo:', error);
        }
      }

      loadCatalog();
    </script>
  </body>
</html>
